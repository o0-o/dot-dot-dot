# Starship prompt — faithful port of the previous powerlevel10k lean
# 8-color config (ascii): gray "date | time | duration | status" line,
# then context/dir/jobs/git as black-on-color blocks, then a magenta
# prompt char that tracks vi mode (> insert, < normal, V visual, ^ replace).
#
# Known deviations from p10k: no transient prompt, exit code hidden when
# zero, git block is green(branch)+bright-yellow(status) instead of one
# block recolored by state, and truncation is fish-style rather than
# truncate-to-unique.

add_newline = false

format = """
$time$cmd_duration$status

$username$hostname$directory$jobs$git_branch$git_state$git_status
$character"""

[time]
disabled = false
format = '[$time]($style)'
time_format = '%Y/%m/%d | %H:%M:%S'
style = 'bright-black'

[cmd_duration]
min_time = 0
format = ' | [$duration]($style)'
style = 'bright-black'

[status]
disabled = false
format = ' | [$status]($style)'
style = 'red'
pipestatus = true
pipestatus_format = ' | [$pipestatus => $status]($style)'
pipestatus_separator = '|'

[username]
format = '[ $user]($style)'
style_user = 'fg:black bg:white'
style_root = 'fg:black bg:red'

[hostname]
ssh_only = true
format = '[@$hostname ]($style) '
style = 'fg:black bg:white'

[directory]
format = '[ $path ]($style)[$read_only]($read_only_style) '
style = 'fg:black bg:blue'
read_only = 'ro'
read_only_style = 'fg:black bg:red'
truncation_length = 8
fish_style_pwd_dir_length = 1
truncation_symbol = ''

[jobs]
format = '[ +$number ]($style) '
style = 'fg:black bg:yellow'
symbol_threshold = 1
number_threshold = 1

[git_branch]
format = '[ $branch ]($style)'
style = 'fg:black bg:green'
only_attached = false

[git_state]
format = '[ $state( $progress_current/$progress_total) ]($style)'
style = 'fg:black bg:red'

[git_status]
format = '([ $ahead_behind$stashed$conflicted$staged$modified$untracked$deleted ]($style))'
style = 'fg:black bg:bright-yellow'
ahead = '>${count} '
behind = '<${count} '
diverged = '<${behind_count} >${ahead_count} '
stashed = '*${count} '
conflicted = '~${count} '
staged = '+${count} '
modified = '!${count} '
untracked = '?${count} '
deleted = 'x${count} '

[character]
success_symbol = '[>](bright-purple)'
error_symbol = '[>](bright-purple)'
vimcmd_symbol = '[<](bright-purple)'
vimcmd_visual_symbol = '[V](bright-purple)'
vimcmd_replace_symbol = '[^](bright-purple)'
vimcmd_replace_one_symbol = '[^](bright-purple)'
