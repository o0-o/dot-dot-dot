# Starship prompt — layout mirrors the previous powerlevel10k lean
# 8-color config: time/duration/status, blank line, context/dir/jobs/git,
# prompt char on its own line. ASCII, transient prompt not supported.

add_newline = false

format = """
$time$cmd_duration$status

$username$hostname$directory$jobs$git_branch$git_state$git_status
$character"""

[time]
disabled = false
format = '[$time]($style) '
time_format = '%H:%M:%S'
style = 'cyan'

[cmd_duration]
min_time = 3_000
format = '[$duration]($style) '
style = 'yellow'

[status]
disabled = false
format = '[$status]($style) '
style = 'red'

[username]
format = '[$user]($style)'
style_user = 'green'
style_root = 'red'

[hostname]
ssh_only = true
format = '[@$hostname]($style) '
style = 'green'

[directory]
format = '[$path]($style)[$read_only]($read_only_style) '
style = 'blue'
truncation_length = 4
read_only = ' ro'

[jobs]
format = '[$symbol$number]($style) '
symbol = '+'
style = 'magenta'

[git_branch]
format = '[$branch]($style) '
style = 'green'

[git_state]
format = '[$state( $progress_current/$progress_total)]($style) '
style = 'yellow'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'yellow'

[character]
success_symbol = '[>](green)'
error_symbol = '[>](red)'
vicmd_symbol = '[<](yellow)'
