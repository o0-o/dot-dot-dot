# Basics ###############################################################
set-option        -g  default-terminal            'tmux-256color'   # Fallback
set-option        -ga terminal-overrides          ',*256col*:Tc'    # 24-bit color
set-window-option -g  xterm-keys                  on                # needed for vim
set-option        -s  focus-events                on

# Glyphs ###############################################################
# Two tiers: rich (Nerd Font slants; UTF-8 implies Nerd Font here) and
# ASCII. Non-UTF-8 clients get ASCII automatically, per client, at
# render time. Force ASCII by starting the server with TTY_ASCII=1 or
# toggling prefix+A. Slant lean is '\'; flip to '/' with E0BA/E0BC/E0BD.
set-option        -g  @ascii                      0                 # 1 forces ASCII glyphs for all clients
set-option        -g  @is-ascii                   '#{||:#{@ascii},#{!=:#{client_utf8},1}}'
set-option        -g  @slant-in                   '#{?#{E:@is-ascii},\,}'
set-option        -g  @slant-out                  '#{?#{E:@is-ascii},\,}'
set-option        -g  @slant-thin                 '#{?#{E:@is-ascii},\,}'
set-option        -g  @pyramid-in                 '#{?#{E:@is-ascii},/,}'
set-option        -g  @point-in                   '#{?#{E:@is-ascii},<,}'
set-option        -g  @point-out                  '#{?#{E:@is-ascii},>,}'
set-option        -g  @point-thin-in              '#{?#{E:@is-ascii},<,}'
set-option        -g  @point-thin-out             '#{?#{E:@is-ascii},>,}'
set-option        -g  @prev-active                '#{==:#{e|-:#{window_index},1},#{s/,.*//:session_stack}}'  # previous window is the current one
# section separators: each arrow takes its neighbor section's color. @ao/@ai
# are the out/in arrows (filled on the active pane, thin on idle); @fl the
# ASCII-aware fill. A separator from color A to B is:
#   #[fg=A] #{E:@ao}#[fg=#{?pane_active,colour15,colour8}]#{E:@fl}#[fg=B]#{E:@ai} #[default]
# built inline in the prompt precmd (dynamic section colors) and as the fixed
# frame pairs below (#P is colour15 active / colour8 idle).
set-option        -g  @ao                          '#{E:@point-thin-out}'
set-option        -g  @ai                          '#{E:@point-thin-in}'
set-option        -g  @fl                          '#{?#{E:@is-ascii},==,══}'
set-option        -g  @sep-p-hdr                   '#[bg=#{?pane_active,colour15,colour8}] #[fg=#{?pane_active,colour15,colour8} bg=default]#{E:@point-out}#[fg=#{?pane_active,colour15,colour8}]#{E:@fl}#[fg=#{?pane_active,colour9,colour8}]#{E:@ai} #[default]'
set-option        -g  @sep-hdr-p                   '#[fg=colour9] #{E:@ao}#[fg=#{?pane_active,colour15,colour8}]#{E:@fl}#[fg=colour11]#{E:@ai} #[default]'
set-option        -g  @sep-p-cmd                   '#[bg=#{?pane_active,colour15,colour8}] #[fg=#{?pane_active,colour15,colour8} bg=default]#{E:@point-out}#[fg=#{?pane_active,colour15,colour8}]#{E:@fl}#[fg=#{?pane_active,colour7,colour8}]#{E:@ai} #[default]'
set-option        -g  @sep-cmd-p                   '#[fg=colour7] #{E:@ao}#[fg=#{?pane_active,colour15,colour8}]#{E:@fl}#[fg=colour11]#{E:@ai} #[default]'
run-shell             'tmux set -g @pid-icon "$(printf "\357\212\222")"'   # PID icon  (U+F292); set via printf so no literal glyph lives in the config
set-option        -g  pane-border-lines           double            # auto-falls back to single ACS on non-UTF-8 clients
# NOTE 2026-07-03: heavy lines on only the active pane is not possible:
# set -p pane-border-lines silently promotes to the window option
# (verified on 3.7b), so line type is always uniform per window.
%if "${TTY_ASCII}"
set-option        -g  @ascii                      1
set-option        -g  pane-border-lines           single
%endif

# Interface ############################################################
set-window-option -g  aggressive-resize           on                # prefer not to see negative space
set-option        -g  mouse                       on                # enable mouse
set-option        -g  set-titles                  on                # set terminal title
set-option        -g  base-index                  1                 # start windows numbering at 1
set-window-option -g  pane-base-index             1                 # make pane numbering consistent with windows
set-option        -g  renumber-windows            on                # renumber windows when a window is closed
set-window-option -g  automatic-rename            on                # rename window to reflect current program
set-option        -g  display-panes-time          800               # slightly longer pane indicators display time
set-option        -g  display-time                1000              # slightly longer status messages display time
set-option        -g  status-position             top               # status bar on top
set-option        -g  pane-border-status          top               # pane status on top
set-option        -g  pane-border-format          '#[fg=#{?pane_active,colour15,colour8} bg=default]#{E:@point-in}#[fg=colour0 bg=#{?pane_active,colour15,colour8} bold] #P │ #{pane_pid}#[default]#{?#{m:*.*.*,#{pane_current_command}},#{E:@sep-p-hdr}#[fg=#{?pane_active,colour9,colour8}]#{pane_title}#[default] #[fg=#{?pane_active,colour9,colour8} bg=default]#{E:@point-thin-out}#[default],#{?#{@prompt},#{E:@prompt},#{E:@sep-p-cmd}#[fg=#{?pane_active,colour7,colour8}]#{pane_current_command}#[default] #[fg=#{?pane_active,colour7,colour8} bg=default]#{E:@point-thin-out}#[default]}}'

# Theme ################################################################
set-option        -g  pane-border-style           'fg=colour8'
set-option        -g  pane-active-border-style    'fg=colour15'
set-option        -g  status-style                fg=colour0
set-option        -g  @accent                     '#{?window_zoomed_flag,colour5,#{?client_prefix,colour3,colour2}}'
set-option        -g  status-left-length          24
set-option        -g  status-left-style           default
set-option        -g  status-left                 '#[fg=#{E:@accent} bg=default]#{E:@pyramid-in}#[fg=colour0 bg=#{E:@accent}] #S '
set-option        -ga status-left                 '#[fg=#{E:@accent} bg=default]#{E:@slant-out}#[default]'
set-option        -g  status-right                ' #[fg=colour8 bg=default]#{E:@slant-in}#[fg=colour0 bg=colour8] %a %Y/%m/%d %H:%M #[default]'
set-window-option -g  window-status-style         fg=colour8
set-window-option -g  window-status-current-style fg=colour7
set-window-option -g  window-status-activity-style  default           # activity mark lives in window-status-format (tmux default here is reverse)
set-option        -g  window-status-format        '#{?window_start_flag,#[fg=colour8 bg=default nobold]#{E:@slant-in},#{?#{E:@prev-active},#[fg=colour7 bg=colour8 nobold]#{E:@slant-out},#[fg=colour0 bg=colour8 nobold]#{E:@slant-thin}}}#[fg=colour0 bg=colour8 bold]#{?window_activity_flag,#[italics],} #I:#W #{?window_end_flag,#[fg=colour8 bg=default nobold noitalics]#{E:@slant-out}#[default],}'
set-option        -g  window-status-current-format  '#{?window_start_flag,#[fg=colour7 bg=default],#[fg=colour7 bg=colour8]}#{E:@slant-in}#[fg=colour0 bg=colour7 bold] #I:#W #{?window_end_flag,#[fg=colour7 bg=default nobold]#{E:@slant-out}#[default],}'
set-option        -g  window-status-separator     ''
#set-option        -g  window-style                'bg=#26273d'


# Behaviors ############################################################
set-option        -g  history-limit               2000              # more history
set-option        -sg escape-time                 0                 # no escape delay
set-option        -g  status-interval             1                 # update status every second
set-option        -g  monitor-activity            on                # indicate window activity in status bar
set-option        -g  monitor-bell                off               # disable bell
set-option        -g  visual-activity             off               # disable banner

# Key Bindings #########################################################
#set-option        -g  prefix                      C-a               # use a for prefix
#bind-key              C-a                         send-prefix
set-option        -g  prefix                      C-Space           # use a for prefix
bind-key              C-Space                     send-prefix
unbind-key            C-b                                           # instead of b
bind-key              r                           source-file ~/.config/tmux/tmux.conf \; display 'tmux.conf sourced'  # reload this config
bind-key              A                           if-shell -F '#{@ascii}' 'set-option -g @ascii 0 ; set-option -g pane-border-lines double ; display-message "glyphs: rich"' 'set-option -g @ascii 1 ; set-option -g pane-border-lines single ; display-message "glyphs: ASCII"'  # toggle ASCII glyphs
bind-key          -r  h                           select-pane -L    # move left
bind-key          -r  j                           select-pane -D    # move down
bind-key          -r  k                           select-pane -U    # move up
bind-key          -r  l                           select-pane -R    # move right
bind-key          -r  H                           resize-pane -L 2  # resize left
bind-key          -r  J                           resize-pane -D 2  # resize down
bind-key          -r  K                           resize-pane -U 2  # resize up
bind-key          -r  L                           resize-pane -R 2  # resize right
run-shell         -b  'tmux bind  -t  vi-choice h       tree-collapse     2> /dev/null || true'
run-shell         -b  'tmux bind  -t  vi-choice l       tree-expand       2> /dev/null || true'
run-shell         -b  'tmux bind  -t  vi-choice K       start-of-list     2> /dev/null || true'
run-shell         -b  'tmux bind  -t  vi-choice J       end-of-list       2> /dev/null || true'
run-shell         -b  'tmux bind  -t  vi-choice H       tree-collapse-all 2> /dev/null || true'
run-shell         -b  'tmux bind  -t  vi-choice L       tree-expand-all   2> /dev/null || true'
run-shell         -b  'tmux bind  -t  vi-choice Escape  cancel            2> /dev/null || true'
run-shell         -b  'tmux bind  -ct vi-edit   H       start-of-line     2> /dev/null || true'
run-shell         -b  'tmux bind  -ct vi-edit   L       end-of-line       2> /dev/null || true'
run-shell         -b  'tmux bind  -ct vi-edit   q       cancel            2> /dev/null || true'
run-shell         -b  'tmux bind  -ct vi-edit   Escape  cancel            2> /dev/null || true'
bind-key              q                           kill-window \; detach
bind-key              Right                       next-window
bind-key              Left                        previous-window
bind-key              '"'                         split-window -c     "#{pane_current_path}"  # vertical split in current directory
bind-key              %                           split-window -h -c  "#{pane_current_path}"  # horizontal split in current directory

# Plugins ##############################################################
set-option        -g  @plugin                     'tmux-plugins/tmux-yank'
set-option        -g  @plugin                     'tmux-plugins/tmux-resurrect'
set-option        -g  @resurrect-strategy-nvim    'session'
set-option        -g  @resurrect-dir              '~/.local/share/tmux/resurrect'
set-option        -g  @plugin                     'tmux-plugins/tmux-continuum'
set-option        -g  @continuum-restore          'on'
run-shell             '~/.config/tmux/plugins/tpm/tpm'
