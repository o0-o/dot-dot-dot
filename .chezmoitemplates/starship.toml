# Starship prompt — faithful port of the previous powerlevel10k lean
# 8-color config: gray "date | time | duration | status" line, then
# context/dir/jobs/git as black-on-color blocks, then a magenta prompt
# char that tracks vi mode (insert, normal, V visual, ^ replace).
#
# Rendered from .chezmoitemplates/starship.toml in two variants:
# starship.toml (unicode) and starship-ascii.toml (fallback; selected
# by .zshrc when the locale isn't UTF-8 or PROMPT_ASCII is set).
{{- $pipe := "|" -}}
{{- $lock := "ro" -}}
{{- $branch := "" -}}
{{- $chevron := ">" -}}
{{- $chevleft := "<" -}}
{{- $point := "" -}}
{{- $pointl := "" -}}
{{- $gap := " " -}}
{{- $sep := "--" -}}
{{- $gear := "+" -}}
{{- $py := "py " -}}
{{- $node := "node " -}}
{{- $k8s := "k8s " -}}
{{- if .unicode -}}
{{- $k8s = "󱃾 " -}}
{{- $py = " " -}}
{{- $node = " " -}}
{{- $sep = "──" -}}
{{- $gear = " " -}}
{{- $pipe = "│" -}}
{{- $lock = "" -}}
{{- $branch = " " -}}
{{- $chevron = "❯" -}}
{{- $chevleft = "❮" -}}
{{- $gap = "" -}}
{{- $point = "" -}}
{{- $pointl = "" -}}
{{- end }}

add_newline = false

{{ if .unicode -}}
format = """
(${env_var.CMD_STAMP}${env_var.CMD_DUR_FMT}${env_var.CMD_STATUS_FMT}

)[╭─](bright-black) ${env_var.PROMPT_CTX_ROOT}${env_var.PROMPT_CTX_REMOTE}${env_var.CWD_PATH_FMT}$jobs$python$nodejs${env_var.K8S_SEG}${env_var.GIT_SEG_CLEAN}${env_var.GIT_SEG_MODIFIED}${env_var.GIT_SEG_UNTRACKED}${env_var.GIT_SEG_CONFLICT}$git_state
[╰─](bright-black)$character"""
{{- else -}}
format = """
(${env_var.CMD_STAMP}${env_var.CMD_DUR_FMT}${env_var.CMD_STATUS_FMT}

)${env_var.PROMPT_CTX_ROOT}${env_var.PROMPT_CTX_REMOTE}${env_var.CWD_PATH_FMT}$jobs$python$nodejs${env_var.K8S_SEG}${env_var.GIT_SEG_CLEAN}${env_var.GIT_SEG_MODIFIED}${env_var.GIT_SEG_UNTRACKED}${env_var.GIT_SEG_CONFLICT}$git_state
$character"""
{{- end }}

# the info line (timestamp, duration, status) is composed by a zsh
# precmd hook and exported only when a command actually ran — fresh
# shells and bare Enter presses render no info line at all
[env_var.CMD_STAMP]
format = '[$env_value]($style)'
style = 'bright-black'

[env_var.CMD_DUR_FMT]
format = '[ {{ $sep }} $env_value]($style)'
style = 'bright-black'

[env_var.CMD_STATUS_FMT]
format = '[ {{ $sep }} ](bright-black)[$env_value]($style)'
style = 'red'

# context tag: exported by .zshrc when the shell is root or remote
[env_var.PROMPT_CTX_ROOT]
format = '[$env_value]($style) [{{ $sep }}](bright-black) '
style = 'red'

[env_var.PROMPT_CTX_REMOTE]
format = '[$env_value]($style) [{{ $sep }}](bright-black) '
style = 'white'

# path segment: rendered by the cwd-path zsh hook (fish truncation,
# bold git root, direnv allow-state coloring, read-only lock)
[env_var.CWD_PATH_FMT]
format = '[$env_value]($style)'
style = 'cyan'

[jobs]
format = ' [{{ $sep }}](bright-black) [{{ $gear }}$number]($style)'
style = 'yellow'
symbol_threshold = 1
number_threshold = 1

# git segment: computed by a zsh precmd hook (git status --porcelain=v2)
# which exports exactly one GIT_SEG_* variable; the tag's color reflects
# the working-tree state, p10k style
[env_var.GIT_SEG_CLEAN]
format = ' [{{ $sep }}](bright-black) [{{ $branch }}$env_value]($style)'
style = 'green'

[env_var.GIT_SEG_MODIFIED]
format = ' [{{ $sep }}](bright-black) [{{ $branch }}$env_value]($style)'
style = 'bright-yellow'

[env_var.GIT_SEG_UNTRACKED]
format = ' [{{ $sep }}](bright-black) [{{ $branch }}$env_value]($style)'
style = 'bright-green'

[env_var.GIT_SEG_CONFLICT]
format = ' [{{ $sep }}](bright-black) [{{ $branch }}$env_value]($style)'
style = 'red'

[git_state]
format = ' [{{ $sep }}](bright-black) [$state( $progress_current/$progress_total)]($style)'
style = 'red'

# environment segments: each only renders in relevant contexts
[python]
format = '[ {{ $sep }} ](bright-black)[{{ $py }}${pyenv_prefix}(${version})]($style)'
style = 'bright-cyan'

[nodejs]
format = '[ {{ $sep }} ](bright-black)[{{ $node }}($version)]($style)'
style = 'purple'

# k8s segment: composed by a zsh precmd hook when KUBECONFIG is set;
# color reflects talos alignment (magenta match, red mismatch,
# bright-blue when no talosconfig is in scope)
[env_var.K8S_SEG]
format = '[ {{ $sep }} ](bright-black)[{{ $k8s }}$env_value]($style)'
style = 'bright-blue'

[character]
success_symbol = '[{{ $chevron }}](bright-purple)'
error_symbol = '[{{ $chevron }}](bright-purple)'
vimcmd_symbol = '[{{ $chevleft }}](bright-purple)'
vimcmd_visual_symbol = '[V](bright-purple)'
vimcmd_replace_symbol = '[^](bright-purple)'
vimcmd_replace_one_symbol = '[^](bright-purple)'

# minimal profile — the post-command info line (timestamp/duration/exit
# status) plus the vi-aware chevron. Selected inside tmux by .zshrc,
# where the pane border carries cwd/git/k8s; the info-line group renders
# only when a command actually ran, so fresh prompts are just the chevron.
[profiles]
tmux = """
(${env_var.CMD_STAMP}${env_var.CMD_DUR_FMT}${env_var.CMD_STATUS_FMT}
)$character"""
