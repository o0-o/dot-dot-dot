# Starship prompt — faithful port of the previous powerlevel10k lean
# 8-color config: gray "date | time | duration | status" line, then
# context/dir/jobs/git as black-on-color blocks, then a magenta prompt
# char that tracks vi mode (insert, normal, V visual, ^ replace).
#
# Rendered from .chezmoitemplates/starship.toml in two variants:
# starship.toml (unicode) and starship-ascii.toml (fallback; selected
# by .zshrc when the locale isn't UTF-8 or PROMPT_ASCII is set).
{{- $pipe := "|" -}}
{{- $lock := "ro" -}}
{{- $branch := "" -}}
{{- $chevron := ">" -}}
{{- $chevleft := "<" -}}
{{- $point := "" -}}
{{- $pointl := "" -}}
{{- $gap := " " -}}
{{- $sep := "--" -}}
{{- $gear := "+" -}}
{{- if .unicode -}}
{{- $sep = "──" -}}
{{- $gear = " " -}}
{{- $pipe = "│" -}}
{{- $lock = "" -}}
{{- $branch = " " -}}
{{- $chevron = "❯" -}}
{{- $chevleft = "❮" -}}
{{- $gap = "" -}}
{{- $point = "" -}}
{{- $pointl = "" -}}
{{- end }}

add_newline = false

{{ if .unicode -}}
format = """
$time${env_var.CMD_DUR_FMT}$status

[╭─](bright-black) ${env_var.PROMPT_CTX_ROOT}${env_var.PROMPT_CTX_REMOTE}$directory$jobs${env_var.GIT_SEG_CLEAN}${env_var.GIT_SEG_MODIFIED}${env_var.GIT_SEG_UNTRACKED}${env_var.GIT_SEG_CONFLICT}$git_state
[╰─](bright-black)$character"""
{{- else -}}
format = """
$time${env_var.CMD_DUR_FMT}$status

${env_var.PROMPT_CTX_ROOT}${env_var.PROMPT_CTX_REMOTE}$directory$jobs${env_var.GIT_SEG_CLEAN}${env_var.GIT_SEG_MODIFIED}${env_var.GIT_SEG_UNTRACKED}${env_var.GIT_SEG_CONFLICT}$git_state
$character"""
{{- end }}

[time]
disabled = false
format = '[$time]($style)'
time_format = '%Y/%m/%d {{ $sep }} %H:%M:%S'
style = 'bright-black'

# duration is computed and formatted by a zsh precmd hook (stopwatch
# style, ms precision) — starship's own cmd_duration can't do this
[env_var.CMD_DUR_FMT]
format = '[ {{ $sep }} $env_value]($style)'
style = 'bright-black'

[status]
disabled = false
format = '[ {{ $sep }} ](bright-black)[$status]($style)'
style = 'red'
pipestatus = true
pipestatus_format = '[ {{ $sep }} ](bright-black)$pipestatus'
pipestatus_segment_format = '[$status]($style)'
pipestatus_separator = '[{{ $pipe }}](bright-black)'

# context tag: exported by .zshrc when the shell is root or remote
[env_var.PROMPT_CTX_ROOT]
format = '[$env_value]($style) [{{ $sep }}](bright-black) '
style = 'red'

[env_var.PROMPT_CTX_REMOTE]
format = '[$env_value]($style) [{{ $sep }}](bright-black) '
style = 'white'

[directory]
format = '[$path]($style)( [$read_only]($read_only_style))'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)( [$read_only]($read_only_style))'
style = 'blue'
repo_root_style = 'blue bold'
before_repo_root_style = 'blue'
read_only = '{{ $lock }}'
read_only_style = 'red'
truncation_length = 8
fish_style_pwd_dir_length = 1
truncation_symbol = ''

[jobs]
format = ' [{{ $sep }}](bright-black) [{{ $gear }}$number]($style)'
style = 'yellow'
symbol_threshold = 1
number_threshold = 1

# git segment: computed by a zsh precmd hook (git status --porcelain=v2)
# which exports exactly one GIT_SEG_* variable; the tag's color reflects
# the working-tree state, p10k style
[env_var.GIT_SEG_CLEAN]
format = ' [{{ $sep }}](bright-black) [{{ $branch }}$env_value]($style)'
style = 'green'

[env_var.GIT_SEG_MODIFIED]
format = ' [{{ $sep }}](bright-black) [{{ $branch }}$env_value]($style)'
style = 'bright-yellow'

[env_var.GIT_SEG_UNTRACKED]
format = ' [{{ $sep }}](bright-black) [{{ $branch }}$env_value]($style)'
style = 'bright-cyan'

[env_var.GIT_SEG_CONFLICT]
format = ' [{{ $sep }}](bright-black) [{{ $branch }}$env_value]($style)'
style = 'red'

[git_state]
format = ' [{{ $sep }}](bright-black) [$state( $progress_current/$progress_total)]($style)'
style = 'red'

[character]
success_symbol = '[{{ $chevron }}](bright-purple)'
error_symbol = '[{{ $chevron }}](bright-purple)'
vimcmd_symbol = '[{{ $chevleft }}](bright-purple)'
vimcmd_visual_symbol = '[V](bright-purple)'
vimcmd_replace_symbol = '[^](bright-purple)'
vimcmd_replace_one_symbol = '[^](bright-purple)'
