# Starship prompt — faithful port of the previous powerlevel10k lean
# 8-color config: gray "date | time | duration | status" line, then
# context/dir/jobs/git as black-on-color blocks, then a magenta prompt
# char that tracks vi mode (insert, normal, V visual, ^ replace).
#
# Rendered from .chezmoitemplates/starship.toml in two variants:
# starship.toml (unicode) and starship-ascii.toml (fallback; selected
# by .zshrc when the locale isn't UTF-8 or PROMPT_ASCII is set).
{{- $pipe := "|" -}}
{{- $lock := "ro" -}}
{{- $branch := "" -}}
{{- $ahead := ">" -}}
{{- $behind := "<" -}}
{{- $chevron := ">" -}}
{{- $chevleft := "<" -}}
{{- $point := "" -}}
{{- $pointl := "" -}}
{{- if .unicode -}}
{{- $pipe = "│" -}}
{{- $lock = "" -}}
{{- $branch = " " -}}
{{- $ahead = "⇡" -}}
{{- $behind = "⇣" -}}
{{- $chevron = "❯" -}}
{{- $chevleft = "❮" -}}
{{- $point = "" -}}
{{- $pointl = "" -}}
{{- end }}

add_newline = false

{{ if .unicode -}}
format = """
$time${env_var.CMD_DUR_FMT}$status

[╭─](bright-black)$username$hostname$directory$jobs$git_branch$git_state$git_status
[╰─](bright-black)$character"""
{{- else -}}
format = """
$time${env_var.CMD_DUR_FMT}$status

$username$hostname$directory$jobs$git_branch$git_state$git_status
$character"""
{{- end }}

[time]
disabled = false
format = '[$time]($style)'
time_format = '%Y/%m/%d {{ $pipe }} %H:%M:%S'
style = 'bright-black'

# duration is computed and formatted by a zsh precmd hook (stopwatch
# style, ms precision) — starship's own cmd_duration can't do this
[env_var.CMD_DUR_FMT]
format = '[ {{ $pipe }} $env_value]($style)'
style = 'bright-black'

[status]
disabled = false
format = '[ {{ $pipe }} ](bright-black)[$status]($style)'
style = 'red'
pipestatus = true
pipestatus_format = '[ {{ $pipe }} ](bright-black)[$pipestatus => $status]($style)'
pipestatus_separator = '{{ $pipe }}'

[username]
format = '[ $user]($style)'
style_user = 'fg:black bg:white'
style_root = 'fg:black bg:red'

[hostname]
ssh_only = true
format = '[@$hostname ]($style)[{{ $point }}](fg:black bg:white)[{{ $point }}](white) '
style = 'fg:black bg:white'

[directory]
format = '[{{ $pointl }}](blue)[{{ $pointl }}](fg:black bg:blue)[ $path ]($style)[{{ $point }}](fg:black bg:blue)[{{ $point }}](blue)([ $read_only ]($read_only_style)[{{ $point }}](fg:black bg:red)[{{ $point }}](red)) '
style = 'fg:black bg:blue'
read_only = '{{ $lock }}'
read_only_style = 'fg:black bg:red'
truncation_length = 8
fish_style_pwd_dir_length = 1
truncation_symbol = ''

[jobs]
format = '[ +$number ]($style)[{{ $point }}](fg:black bg:yellow)[{{ $point }}](yellow) '
style = 'fg:black bg:yellow'
symbol_threshold = 1
number_threshold = 1

[git_branch]
format = '[ {{ $branch }}$branch ]($style)[{{ $point }}](fg:black bg:green)[{{ $point }}](green)'
style = 'fg:black bg:green'
only_attached = false

[git_state]
format = '[ $state( $progress_current/$progress_total) ]($style)[{{ $point }}](fg:black bg:red)[{{ $point }}](red)'
style = 'fg:black bg:red'

[git_status]
format = '([ $ahead_behind$stashed$conflicted$staged$modified$untracked$deleted ]($style)[{{ $point }}](fg:black bg:bright-yellow)[{{ $point }}](bright-yellow))'
style = 'fg:black bg:bright-yellow'
ahead = '{{ $ahead }}${count} '
behind = '{{ $behind }}${count} '
diverged = '{{ $behind }}${behind_count} {{ $ahead }}${ahead_count} '
stashed = '*${count} '
conflicted = '~${count} '
staged = '+${count} '
modified = '!${count} '
untracked = '?${count} '
deleted = 'x${count} '

[character]
success_symbol = '[{{ $chevron }}](bright-purple)'
error_symbol = '[{{ $chevron }}](bright-purple)'
vimcmd_symbol = '[{{ $chevleft }}](bright-purple)'
vimcmd_visual_symbol = '[V](bright-purple)'
vimcmd_replace_symbol = '[^](bright-purple)'
vimcmd_replace_one_symbol = '[^](bright-purple)'
